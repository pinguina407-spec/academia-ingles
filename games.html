<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Game Zone | English with Ana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .game-box { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 600px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .score-board { font-size: 1.5rem; color: #2a5a8a; font-weight: bold; margin-bottom: 20px; }
        .filter-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .level-btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; background: #ddd; transition: 0.3s; }
        .level-btn.active { background: #2a5a8a; color: white; }
        .q-text { font-size: 1.8rem; margin: 20px 0; color: #333; }
        .game-input { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #eee; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .next-btn { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; width: 100%; display: none; }
    </style>
</head>
<body style="background-color: #fcfaf3;">

    <header style="background: white; padding: 15px 0; border-bottom: 2px solid #2a5a8a;">
        <div class="container">
            <a href="index.html" style="text-decoration: none; color: #2a5a8a; font-weight: bold;">← Salir del Juego</a>
        </div>
    </header>

    <main class="container" style="padding: 40px 0;">
        <div class="filter-btns">
            <button class="level-btn active" onclick="startGame('kids', this)">🧸 Kids</button>
            <button class="level-btn" onclick="startGame('teens', this)">🎓 Teens</button>
            <button class="level-btn" onclick="startGame('adv', this)">🚀 Advanced</button>
        </div>

        <div class="game-box">
            <div class="score-board">Points: <span id="points">0</span> | Round: <span id="round">1</span></div>
            <div id="game-content">
                <p id="category-label" style="text-transform: uppercase; color: #888; letter-spacing: 1px;"></p>
                <div class="q-text" id="question">Loading...</div>
                <input type="text" id="user-answer" class="game-input" placeholder="Type here..." autocomplete="off">
                <button onclick="checkAnswer()" id="check-btn" class="game-btn" style="width: 100%;">Check Answer</button>
                <button onclick="nextRound()" id="next-btn" class="next-btn">Next Round →</button>
                <p id="feedback" style="margin-top: 20px; font-weight: bold; min-height: 24px;"></p>
            </div>
        </div>
    </main>

    <script src="games-logic.js"></script>
</body>
</html>
