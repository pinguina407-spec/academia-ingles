<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niveles Oficiales | English with Ana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #fcfaf3;">
    <header style="background: white; padding: 15px 0; border-bottom: 2px solid #2a5a8a;">
        <div class="container">
            <a href="index.html" style="text-decoration: none; color: #2a5a8a; font-weight: bold;">← Volver al inicio</a>
        </div>
    </header>

    <main class="container" style="padding: 40px 0;">
        <h2 style="color: #2a5a8a; margin-bottom: 25px; text-align:center;">⭐ Preparación de Niveles Oficiales</h2>
        
        <div class="card" style="text-align: left; padding: 30px;">
            <p style="margin-bottom: 20px;">Te acompañamos en tu camino hacia la certificación oficial (Cambridge):</p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                <div style="background: #e9eff5; padding: 15px; border-radius: 10px; text-align: center;">
                    <h1 style="color: #2a5a8a;">A2</h1>
                    <p>Key (KET)</p>
                </div>
                <div style="background: #e9eff5; padding: 15px; border-radius: 10px; text-align: center;">
                    <h1 style="color: #2a5a8a;">B1</h1>
                    <p>Preliminary (PET)</p>
                </div>
                <div style="background: #e9eff5; padding: 15px; border-radius: 10px; text-align: center;">
                    <h1 style="color: #2a5a8a;">B2</h1>
                    <p>First (FCE)</p>
                </div>
            </div>
            <p style="margin-top: 20px;">✅ Simulacros de examen reales y técnicas de 'Speaking' para perder el miedo.</p>
        </div>
    </main>
</body>
</html>
